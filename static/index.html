<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXKtoday - Scanner Monitor</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>TXKtoday - Scanner Monitor</h1>
        <div class="audio-meter">
            <button class="live-listen-btn" id="live-listen-btn" onclick="toggleLiveAudio()" title="Listen live">
                <svg viewBox="0 0 16 16" class="live-listen-icon" id="live-listen-icon"><polygon points="4,2 14,8 4,14"/></svg>
            </button>
            <div class="audio-meter-bar">
                <div class="audio-meter-fill" id="audio-meter-fill"></div>
                <div class="audio-meter-peak" id="audio-meter-peak"></div>
            </div>
            <span class="audio-meter-db" id="audio-meter-db">--dB</span>
        </div>
        <div class="status-bar">
            <span id="ws-status"><span class="status-dot disconnected"></span>Disconnected</span>
            <span id="pipeline-status"><span class="status-dot disconnected"></span>Pipeline idle</span>
            <span id="counts"></span>
            <span id="chunk-status" style="color:var(--text-dim)"></span>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" data-tab="live">Live</div>
        <div class="tab" data-tab="history">History</div>
        <div class="tab" data-tab="map">Map</div>
        <div class="tab" data-tab="config">Settings</div>
    </div>

    <div class="main">
        <!-- Live Panel -->
        <div class="panel live-panel active" id="panel-live">
            <div class="feed" id="feed">
                <h2>Live Transcriptions</h2>
                <div id="transcript-list">
                    <div class="empty-state">Waiting for transcriptions...</div>
                </div>
            </div>
            <div class="alerts-sidebar">
                <h2>Events</h2>
                <div id="event-list">
                    <div class="empty-state">No events yet</div>
                </div>
            </div>
        </div>

        <!-- History Panel -->
        <div class="panel history-panel" id="panel-history">
            <h2>Transcription History</h2>
            <div id="history-list"></div>
            <div class="load-more">
                <button class="btn" id="load-more-btn" onclick="loadHistory()">Load More</button>
            </div>
        </div>

        <!-- Map Panel -->
        <div class="panel map-panel" id="panel-map">
            <div class="map-toolbar">
                <div class="map-filter-group">
                    <label>Show:</label>
                    <select id="map-filter-status" onchange="filterMapMarkers()">
                        <option value="">All Events</option>
                        <option value="active">Active Only</option>
                        <option value="resolved">Resolved Only</option>
                    </select>
                    <select id="map-filter-time" onchange="filterMapMarkers()">
                        <option value="">All Time</option>
                        <option value="1">Last Hour</option>
                        <option value="6">Last 6 Hours</option>
                        <option value="24">Last 24 Hours</option>
                        <option value="72">Last 3 Days</option>
                        <option value="168">Last 7 Days</option>
                    </select>
                </div>
                <div class="map-stats" id="map-stats"></div>
            </div>
            <div id="map-container"></div>
        </div>

        <!-- Config Panel -->
        <div class="panel config-panel" id="panel-config">
            <h2 style="font-size:14px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:20px;">Settings</h2>
            <div class="form-group">
                <label>Stream URL</label>
                <input type="url" id="cfg-stream-url" placeholder="https://broadcastify.cdnstream1.com/...">
            </div>
            <div class="form-group">
                <label>OpenRouter API Key</label>
                <input type="password" id="cfg-api-key" placeholder="sk-or-v1-...">
            </div>
            <div class="form-group">
                <label>Analysis Model</label>
                <select id="cfg-model">
                    <option value="">Loading models...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Whisper Model</label>
                <select id="cfg-whisper">
                    <option value="tiny">tiny (fastest)</option>
                    <option value="base" selected>base (recommended)</option>
                    <option value="small">small (better accuracy)</option>
                    <option value="medium">medium (high accuracy)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Alert Sensitivity</label>
                <select id="cfg-sensitivity">
                    <option value="low">Low - Critical events only</option>
                    <option value="medium" selected>Medium - Significant events</option>
                    <option value="high">High - Most notable events</option>
                </select>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">
            <h3 style="font-size:14px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px;">AI Analysis Prompt</h3>
            <div class="form-group">
                <label>Base System Prompt <span style="color:var(--text-dim);font-weight:normal">(read-only)</span></label>
                <textarea id="cfg-system-prompt" readonly rows="10" style="resize:vertical;opacity:0.7;cursor:default"></textarea>
            </div>
            <div class="form-group">
                <label>Custom Instructions <span style="color:var(--text-dim);font-weight:normal">(appended to prompt)</span></label>
                <textarea id="cfg-custom-instructions" rows="5" style="resize:vertical" placeholder="e.g. This scanner monitors Springfield County PD. Alert on any mentions of Main Street or the downtown area. Ignore routine traffic stops on Highway 65."></textarea>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">
            <h3 style="font-size:14px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px;">Map Settings</h3>
            <div class="form-group">
                <label>Google Maps API Key</label>
                <input type="password" id="cfg-maps-api-key" placeholder="AIza...">
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:1">
                    <label>Default Map Center Latitude</label>
                    <input type="number" id="cfg-map-lat" step="0.0001" placeholder="33.4418">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Default Map Center Longitude</label>
                    <input type="number" id="cfg-map-lng" step="0.0001" placeholder="-94.0477">
                </div>
            </div>
            <button class="btn" onclick="saveConfig()">Save Settings</button>
            <span class="save-msg" id="save-msg">Settings saved!</span>
        </div>
    </div>

    <audio id="shared-audio"></audio>
    <audio id="live-audio" preload="none"></audio>

    <script src="/app.js"></script>
</body>
</html>
